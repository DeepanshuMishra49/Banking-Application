version: "3.6"

services:
   
  mysql:
    container_name: mysql  
    image: mysql
    environment:
       MYSQL_ROOT_PASSWORD: Test123
       MYSQL_DATABASE: bankdb
    volumes:
       - mysql-data:/var/lib/mysql
    networks:
       - banking-app
    ports : 
      - "3306:3306"     
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pTest123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s  
         


  java-app:
    container_name: Banking-Application
    image: deep270804/banking-app-image:latest
    environment:
       SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bankdb
       SPRING_DATASOURCE_USERNAME : root
       SPRING_DATASOURCE_PASSWORD : Test123
    networks : 
      - banking-app
    ports : 
      - "8088:8088"    
    depends_on :
      - mysql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
        

   
volumes:
  mysql-data:  
networks: 
  banking-app:
