<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle} ?: 'Banking App'">Banking App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
    <style>
        :root {
            --primary-dark: #0d47a1;
            --primary-light: #1976d2;
            --accent: #00bcd4;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%); min-height: 100vh; }
        .navbar { background: linear-gradient(90deg, var(--primary-dark), var(--primary-light)) !important; }
        .btn-primary { background: var(--primary-light); border: none; }
        .btn-primary:hover { background: var(--primary-dark); }
        .card { border: none; box-shadow: var(--card-shadow); border-radius: 12px; }
        .account-card { transition: transform 0.2s; }
        .account-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-bank2 me-2"></i>SecureBank</a>
        <div class="navbar-nav ms-auto" sec:authorize="isAuthenticated()">
            <a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-grid-1x2 me-1"></i>Dashboard</a>
            <span class="nav-link" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
        <div class="navbar-nav ms-auto" sec:authorize="!isAuthenticated()">
            <a class="nav-link" th:href="@{/login}">Login</a>
            <a class="nav-link" th:href="@{/register}">Register</a>
        </div>
    </div>
</nav>
<main class="container my-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:replace="~{::content}">Page content</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
