<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Register - SecureBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <h4 class="text-center mb-4"><i class="bi bi-bank2 text-primary"></i> SecureBank</h4>
                    <h5 class="mb-4">Create account</h5>
                    <p th:if="${error}" class="alert alert-danger" th:text="${error}"></p>
                    <form th:action="@{/register}" th:object="${registerDto}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Full name</label>
                            <input th:field="*{fullName}" class="form-control" placeholder="John Doe"/>
                            <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-danger small"></p>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input th:field="*{email}" type="email" class="form-control" placeholder="your@email.com"/>
                            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small"></p>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input th:field="*{password}" type="password" class="form-control"/>
                            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small"></p>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm password</label>
                            <input th:field="*{confirmPassword}" type="password" class="form-control"/>
                            <p th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="text-danger small"></p>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Register</button>
                    </form>
                    <p class="mt-3 text-center text-muted small">Already have an account? <a th:href="@{/login}">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
