<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>SecureBank - Welcome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
    <style>
        body { background: linear-gradient(135deg, #0d47a1 0%, #1976d2 50%, #00bcd4 100%); min-height: 100vh; display: flex; align-items: center; }
        .hero { color: white; text-align: center; padding: 3rem; }
        .hero h1 { font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .btn-light { border-radius: 50px; padding: 12px 32px; font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <i class="bi bi-bank2" style="font-size: 4rem;"></i>
        <h1 class="mt-3">Welcome to SecureBank</h1>
        <p class="lead opacity-90">Your trusted partner for secure banking. Manage accounts, transfer money, and track transactions.</p>
        <div class="mt-4">
            <a th:href="@{/login}" class="btn btn-light me-2"><i class="bi bi-box-arrow-in-right me-2"></i>Login</a>
            <a th:href="@{/register}" class="btn btn-outline-light"><i class="bi bi-person-plus me-2"></i>Register</a>
        </div>
        <p th:if="${param.logout}" class="mt-3 text-success">You have been logged out successfully.</p>
        <p th:if="${param.registered}" class="mt-3 text-success">Registration successful. Please login.</p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
